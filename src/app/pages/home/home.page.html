<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="ion-text-center">
      Mi lista
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-item>
    <ion-input type="text" placeholder="Ingresa una tarea...." 
      name="task" [(ngModel)]="task"></ion-input>
    <ion-button (click)="addTask()" [disabled]="!task">
      <ion-icon name="add-outline"></ion-icon>
    </ion-button>
  </ion-item>

  <ion-list *ngIf="tasks.length > 0">
    <ion-reorder-group disabled="false" (ionItemReorder)="actualizarPosiciones($event)">
      <ion-item-sliding *ngFor="let task of tasks; trackBy: trackByTask">
        <ion-item>
          <ion-label>{{task}}</ion-label>
          <ion-reorder slot="end"></ion-reorder>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="confirmDelete(task)">
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-reorder-group>
  </ion-list>

  <ion-item *ngIf="tasks.length === 0" lines="none" class="ion-text-center">
    No hay tareas pendientes
  </ion-item>
</ion-content>
